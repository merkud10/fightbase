name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./prisma/ci.db
      DEPLOYMENT_ENV: preview
      AUTH_SESSION_SECRET: ci-auth-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-password
      INTERNAL_API_SECRET: ci-internal-secret
      INGEST_CRON_SECRET: ci-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ADS_ENABLED: "0"
      OPENAI_API_KEY: ""
      OLLAMA_URL: ""
      OLLAMA_MODEL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Push temporary CI schema
        run: npm run db:push

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Sync DB schema before smoke (standalone uses a copy under .next/standalone)
        run: npm run db:push

      - name: Run smoke checks
        run: npm run test:smoke

name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: fightbase_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fightbase_ci
      DEPLOYMENT_ENV: preview
      AUTH_SESSION_SECRET: ci-auth-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-password
      INTERNAL_API_SECRET: ci-internal-secret
      INGEST_CRON_SECRET: ci-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ADS_ENABLED: "0"
      OPENAI_API_KEY: ""
      OLLAMA_URL: ""
      OLLAMA_MODEL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (postgres)
        run: npm run prisma:generate:pg

      - name: Push postgres schema
        run: npm run db:push:pg

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Run smoke checks
        run: npm run test:smoke

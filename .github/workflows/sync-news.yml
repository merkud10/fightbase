name: "Sync News"

on:
  schedule:
    # Каждые 6 часов: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual sync'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger AI news discovery
        id: sync
        run: |
          response=$(curl -sf -w "\n%{http_code}" -X POST "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/ingest" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.INGEST_CRON_SECRET }}" \
            -d '{"job":"ai-discovery","lookbackHours":8,"limit":10,"status":"published"}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "sync_ok=false" >> "$GITHUB_OUTPUT"
            echo "News sync failed with HTTP $http_code"
            exit 1
          fi

          queued_job_id=$(echo "$body" | jq -r '.queuedJobId // empty')
          echo "queued_job_id=$queued_job_id" >> "$GITHUB_OUTPUT"
          echo "sync_ok=true" >> "$GITHUB_OUTPUT"

      - name: Wait for background job to process
        run: |
          sleep 30
          for i in 1 2 3 4 5 6 7 8; do
            curl -sf -X POST "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/jobs" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_CRON_SECRET }}" \
              -d '{"limit": 5}' || true
            sleep 20
          done

      - name: Resolve news job stats
        id: jobstats
        if: steps.sync.outputs.sync_ok == 'true'
        run: |
          JOB_ID="${{ steps.sync.outputs.queued_job_id }}"
          BASE="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          SECRET="${{ secrets.INGEST_CRON_SECRET }}"

          if [ -z "$JOB_ID" ]; then
            echo "summary=queued_job_id_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for _ in $(seq 1 48); do
            data=$(curl -sf "${BASE}/api/cron/background-job/${JOB_ID}" \
              -H "Authorization: Bearer ${SECRET}") || { sleep 5; continue; }

            status=$(echo "$data" | jq -r '.job.status // empty')

            if [ "$status" = "succeeded" ]; then
              CREATED=$(echo "$data" | jq -r '.stats.created // empty')
              DUPS=$(echo "$data" | jq -r '.stats.duplicates // empty')
              FAIL=$(echo "$data" | jq -r '.stats.failed // empty')
              echo "created=${CREATED}" >> "$GITHUB_OUTPUT"
              echo "duplicates=${DUPS}" >> "$GITHUB_OUTPUT"
              echo "failed=${FAIL}" >> "$GITHUB_OUTPUT"
              echo "summary=ok" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$status" = "failed" ]; then
              echo "created=0" >> "$GITHUB_OUTPUT"
              echo "duplicates=" >> "$GITHUB_OUTPUT"
              echo "failed=" >> "$GITHUB_OUTPUT"
              echo "summary=failed" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 5
          done

          echo "created=" >> "$GITHUB_OUTPUT"
          echo "duplicates=" >> "$GITHUB_OUTPUT"
          echo "failed=" >> "$GITHUB_OUTPUT"
          echo "summary=timeout" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: steps.sync.outputs.sync_ok == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ALERTS_CHAT_ID }}
        run: |
          CREATED='${{ steps.jobstats.outputs.created }}'
          DUPS='${{ steps.jobstats.outputs.duplicates }}'
          FAIL='${{ steps.jobstats.outputs.failed }}'
          SUMMARY='${{ steps.jobstats.outputs.summary }}'

          case "$SUMMARY" in
            queued_job_id_missing)
              TEXT="⚠️ Сбор новостей: задача поставлена в очередь, но не удалось получить id задачи для отчёта."
              ;;
            failed)
              TEXT="❌ Сбор новостей: фоновая задача завершилась с ошибкой (новых материалов: 0)."
              ;;
            timeout)
              TEXT="⚠️ Сбор новостей: не дождались завершения задачи за отведённое время; число новых материалов неизвестно."
              ;;
            ok)
              C_LABEL="${CREATED:-0}"
              D_LABEL="${DUPS:-0}"
              F_LABEL="${FAIL:-0}"
              TEXT="✅ Сбор новостей завершён. Новых материалов: ${C_LABEL}. Дубликатов: ${D_LABEL}. Ошибок при загрузке: ${F_LABEL}."
              ;;
            *)
              TEXT="✅ Сбор новостей: задача поставлена в очередь (отчёт недоступен)."
              ;;
          esac

          jq -n \
            --arg chat "$TG_CHAT" \
            --arg text "$TEXT" \
            '{chat_id: $chat, text: $text, disable_notification: true}' \
            | curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @-

services:
  postgres:
    image: postgres:16
    container_name: fightbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fightbase
      POSTGRES_USER: fightbase
      POSTGRES_PASSWORD: fightbase
    ports:
      - "5432:5432"
    volumes:
      - fightbase-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fightbase -d fightbase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fightbase-postgres-data:
